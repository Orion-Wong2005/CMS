{% extends "base.html" %}

{% block title %}登录 - 课程管理系统{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h4 class="mb-0">课程管理系统</h4>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">用户名</label>
                            <input type="text" class="form-control" id="username" name="username" 
                                   placeholder="请输入用户名" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">密码</label>
                            <input type="password" class="form-control" id="password" name="password" 
                                   placeholder="请输入密码" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-block">登录</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center">
                    <div class="text-muted mb-2">
                        <small><strong>管理员账号：</strong>admin / admin</small>
                    </div>
                    <div class="text-muted mb-1">
                        <small><strong>学生账号：</strong></small>
                    </div>
                    <div class="text-muted mb-1">
                        <small>test001stu / test001stu (虚拟学生男)</small>
                    </div>
                    <div class="text-muted mb-1">
                        <small>test002stu / test002stu (虚拟学生女)</small>
                    </div>
                    <div class="text-muted mb-1">
                        <small><strong>教师账号：</strong></small>
                    </div>
                    <div class="text-muted">
                        <small>test001tea / test001tea (虚拟教师男)</small>
                    </div>
                    <div class="text-muted">
                        <small>test002tea / test002tea (虚拟教师女)</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
