{% extends "base.html" %}

{% block title %}403 无权限访问 - 课程管理系统{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="display-1 text-muted mb-4">403</div>
            <h2 class="mb-3">抱歉，您没有访问权限</h2>
            <p class="text-muted mb-4">
                您的账号没有权限访问该页面，请联系管理员获取权限。
            </p>
            <div class="d-flex justify-content-center gap-3">
                <a href="javascript:history.back()" class="btn btn-secondary">返回上一页</a>
                <a href="{{ url_for('auth_bp.login') }}" class="btn btn-primary">返回登录页</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
