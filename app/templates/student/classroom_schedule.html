{% extends "base.html" %}

{% block title %}教室课表查询 - 课程管理系统{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4"><i class="bi bi-building me-2"></i>教室课表查询</h2>
    <p class="text-muted">查看每间教室每天的课程安排</p>

    <!-- 查询条件 -->
    <div class="card mb-4">
        <div class="card-body">
            <div class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label for="classroomSelect" class="form-label">选择教室</label>
                    <select class="form-select" id="classroomSelect">
                        <option value="">-- 请选择教室 --</option>
                        {% for c in classrooms %}
                        <option value="{{ c.id }}">{{ c.classroom_number }} ({{ c.building }} {{ c.floor }}层 容量:{{ c.capacity }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="semesterInput" class="form-label">学期（可选）</label>
                    <input type="text" class="form-control" id="semesterInput" placeholder="如：2025-2026-2">
                </div>
                <div class="col-md-2">
                    <label for="weekInput" class="form-label">周次（可选）</label>
                    <input type="number" class="form-control" id="weekInput" placeholder="1-20" min="1" max="20">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100" id="queryBtn">
                        <i class="bi bi-search me-1"></i>查询
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 课表展示区域 -->
    <div id="timetableContainer">
        <div class="card">
            <div class="card-body text-center text-muted py-5">
                <i class="bi bi-search" style="font-size: 3rem;"></i>
                <p class="mt-3">请选择教室后点击查询</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(function() {
    $('#queryBtn').on('click', function() {
        var classroomId = $('#classroomSelect').val();
        if (!classroomId) {
            alert('请先选择教室');
            return;
        }

        var semester = $('#semesterInput').val().trim();
        var week = $('#weekInput').val();

        var url = '/student/api/classroom-timetable?classroom_id=' + classroomId;
        if (semester) url += '&semester=' + encodeURIComponent(semester);
        if (week) url += '&week=' + week;

        $('#timetableContainer').html('<div class="text-center py-5"><div class="spinner-border text-primary" role="status"></div><p class="mt-2">加载中...</p></div>');

        $.getJSON(url, function(res) {
            if (res.code !== 200) {
                $('#timetableContainer').html('<div class="alert alert-danger">' + (res.message || '查询失败') + '</div>');
                return;
            }

            var data = res.data;
            var classroom = data.classroom;
            var timetable = data.timetable;

            var dayNames = ['', '周一', '周二', '周三', '周四', '周五', '周六', '周日'];

            var html = '<div class="card">';
            html += '<div class="card-header bg-light">';
            html += '<h5 class="mb-0"><i class="bi bi-door-closed me-2"></i>' + classroom.classroom_number;
            html += ' <small class="text-muted">' + classroom.building + ' ' + (classroom.floor || '') + '层 | 容量:' + classroom.capacity + ' | 类型:' + classroom.type + '</small></h5>';
            html += '</div>';
            html += '<div class="card-body p-0">';
            html += '<div class="table-responsive">';
            html += '<table class="table table-bordered text-center align-middle mb-0">';
            html += '<thead class="table-light"><tr>';
            html += '<th style="width:70px;">节次</th><th style="width:110px;">时间</th>';
            for (var d = 1; d <= 7; d++) {
                html += '<th>' + dayNames[d] + '</th>';
            }
            html += '</tr></thead><tbody>';

            for (var i = 0; i < timetable.length; i++) {
                var row = timetable[i];
                html += '<tr>';
                html += '<td class="fw-bold">' + row.section + '</td>';
                html += '<td class="text-muted small">' + row.time + '</td>';
                for (var d = 1; d <= 7; d++) {
                    var cell = row['day_' + d];
                    if (cell) {
                        html += '<td class="bg-info bg-opacity-25">';
                        html += '<strong>' + cell.course_name + '</strong><br>';
                        html += '<small>' + cell.teacher + '</small><br>';
                        html += '<small class="text-muted">' + cell.classroom + '</small>';
                        if (cell.semester) {
                            html += '<br><small class="text-muted">' + cell.semester + '</small>';
                        }
                        html += '</td>';
                    } else {
                        html += '<td></td>';
                    }
                }
                html += '</tr>';
            }

            html += '</tbody></table></div></div>';
            html += '<div class="card-footer text-muted small">';
            html += '<i class="bi bi-info-circle me-1"></i> 课程时间：上午 08:00-11:50 | 下午 14:00-17:50。45分钟小课+10分钟课间，大节之间休息30分钟。';
            html += '</div></div>';

            $('#timetableContainer').html(html);
        }).fail(function(jqXHR, textStatus, errorThrown) {
            $('#timetableContainer').html('<div class="alert alert-danger">查询失败: ' + textStatus + '，请重试</div>');
        });
    });

    // 支持回车键查询
    $('#weekInput, #semesterInput').on('keypress', function(e) {
        if (e.which === 13) {
            $('#queryBtn').trigger('click');
        }
    });
});
</script>
{% endblock %}
