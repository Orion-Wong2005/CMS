{% extends 'base.html' %}

{% block title %}添加学期 - 课程管理系统{% endblock %}

{% block content %}
<div class="container">
    <h2 class="mt-4 mb-4">
        <i class="bi bi-calendar-plus"></i> 添加学期
    </h2>
    
    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label for="year_start" class="form-label">学年开始年份 *</label>
                        <input type="number" class="form-control" id="year_start" name="year_start" 
                               value="{{ year_start if year_start else current_year }}" min="2020" max="2100" required>
                        <div class="form-text">例如：2025</div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="year_end" class="form-label">学年结束年份 *</label>
                        <input type="number" class="form-control" id="year_end" name="year_end" 
                               value="{{ year_end if year_end else (current_year + 1) }}" min="2020" max="2100" required>
                        <div class="form-text">例如：2026</div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="semester_num" class="form-label">学期序号 *</label>
                        <select class="form-select" id="semester_num" name="semester_num" required>
                            <option value="">请选择</option>
                            <option value="1" {% if default_semester == 1 %}selected{% endif %}>第 1 学期（秋季）</option>
                            <option value="2" {% if default_semester == 2 %}selected{% endif %}>第 2 学期（春季）</option>
                            <option value="3" {% if default_semester == 3 %}selected{% endif %}>第 3 学期（暑期）</option>
                        </select>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="start_date" class="form-label">学期开始日期</label>
                        <input type="date" class="form-control" id="start_date" name="start_date">
                        <div class="form-text">可选，用于排课时限制</div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="end_date" class="form-label">学期结束日期</label>
                        <input type="date" class="form-control" id="end_date" name="end_date">
                        <div class="form-text">可选，用于排课时限制</div>
                    </div>
                </div>
                
                <div class="alert alert-secondary">
                    <h6><i class="bi bi-lightbulb me-2"></i>学期命名规则</h6>
                    <p class="mb-0">学期名称格式为 <code>yyyy-yyyy-n</code></p>
                    <ul class="mb-0">
                        <li>第1学期（秋季）：通常 9 月开学</li>
                        <li>第2学期（春季）：通常 2-3 月开学</li>
                        <li>第3学期（暑期）：通常 7-8 月</li>
                    </ul>
                </div>
                
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle me-1"></i>保存
                    </button>
                    <a href="{{ url_for('semester_bp.semester_list') }}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-1"></i>返回列表
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
