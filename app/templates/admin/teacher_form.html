{% extends "base.html" %}

{% block title %}{% if teacher %}编辑教师{% else %}添加教师{% endif %} - 课程管理系统{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">{% if teacher %}编辑教师{% else %}添加教师{% endif %}</h2>
    
    <div class="card">
        <div class="card-body">
            <form method="post">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="teacher_id" class="form-label">工号 *</label>
                        <input type="text" class="form-control" id="teacher_id" name="teacher_id" 
                               value="{{ teacher.teacher_id if teacher else '' }}" 
                               {% if teacher %}readonly{% endif %} required>
                        {% if not teacher %}
                        <div class="form-text">默认登录密码为工号</div>
                        {% endif %}
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="name" class="form-label">姓名 *</label>
                        <input type="text" class="form-control" id="name" name="name" 
                               value="{{ teacher.name if teacher else '' }}" required>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="gender" class="form-label">性别</label>
                        <select class="form-select" id="gender" name="gender">
                            <option value="">请选择</option>
                            <option value="男" {% if teacher and teacher.gender == '男' %}selected{% endif %}>男</option>
                            <option value="女" {% if teacher and teacher.gender == '女' %}selected{% endif %}>女</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="department" class="form-label">院系</label>
                        <input type="text" class="form-control" id="department" name="department" 
                               value="{{ teacher.department if teacher else '' }}">
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="title" class="form-label">职称</label>
                        <select class="form-select" id="title" name="title">
                            <option value="">请选择职称</option>
                            <option value="助教" {% if teacher and teacher.title == '助教' %}selected{% endif %}>助教</option>
                            <option value="讲师" {% if teacher and teacher.title == '讲师' %}selected{% endif %}>讲师</option>
                            <option value="副教授" {% if teacher and teacher.title == '副教授' %}selected{% endif %}>副教授</option>
                            <option value="教授" {% if teacher and teacher.title == '教授' %}selected{% endif %}>教授</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="phone" class="form-label">手机号</label>
                        <input type="tel" class="form-control" id="phone" name="phone" 
                               value="{{ teacher.phone if teacher else '' }}">
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="email" class="form-label">邮箱</label>
                    <input type="email" class="form-control" id="email" name="email" 
                           value="{{ teacher.email if teacher else '' }}">
                </div>
                
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-check-circle me-1"></i>保存
                    </button>
                    <a href="{{ url_for('admin_bp.teacher_list') }}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-1"></i>返回列表
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
