<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 课程管理系统</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- 自定义本地样式（你项目里的 static/css/style.css） -->
    <link rel="stylesheet" href="/static/css/style.css">

    <style>
        /* 防止导航栏遮挡页面内容 */
        body {
            padding-top: 56px;
        }
        /* 导航栏激活状态样式 */
        .navbar-nav .nav-link.active {
            font-weight: 600;
            color: #0d6efd !important;
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <!-- 系统名称 -->
            <a class="navbar-brand" href="/auth/login">
                <i class="bi bi-book-half me-2"></i>课程管理系统
            </a>
            
            <!-- 移动端折叠按钮 -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <!-- 导航菜单 -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    
                </ul>

                <!-- 右侧用户信息和退出按钮 -->
                <ul class="navbar-nav">
                    
                        <li class="nav-item">
                            <a class="nav-link" href="/auth/login">
                                <i class="bi bi-box-arrow-in-right me-1"></i>登录
                            </a>
                        </li>
                    
                </ul>
            </div>
        </div>
    </nav>

    <!-- 消息闪现 -->
    
        
            <div class="container mt-3">
                
                    <div class="alert alert-warning alert-dismissible fade show" role="alert">
                        请先登录
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                
            </div>
        
    

    <!-- 页面内容 -->
    
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h4 class="mb-0">课程管理系统</h4>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">用户名</label>
                            <input type="text" class="form-control" id="username" name="username" 
                                   placeholder="请输入用户名" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">密码</label>
                            <input type="password" class="form-control" id="password" name="password" 
                                   placeholder="请输入密码" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-block">登录</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center text-muted">
                    <small>管理员账号：admin / 123456</small>
                </div>
            </div>
        </div>
    </div>
</div>


    <!-- 页脚 -->
    <footer class="bg-light py-3 mt-5">
        <div class="container text-center text-muted">
            <small>© 2026 课程管理系统 | 基于 Flask + SQLite 开发</small>
        </div>
    </footer>

    <!-- jQuery (必须在 Bootstrap 之前) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- 自定义本地 JS（static/js/common.js） -->
    <script src="/static/js/common.js"></script>
</body>
</html>
